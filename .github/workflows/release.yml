name: Release

# Publishes @vestlang/core, @vestlang/vestlang and @vestlang/mcp-server to npmjs
# via Trusted Publishing (OIDC) — each package's trusted publisher on npmjs.com
# names this repo and workflow, so no NPM_TOKEN secret exists anywhere. A
# package's *first* release is the exception: npm won't accept a trusted
# publisher for a name that doesn't exist yet, so version 1 goes up by hand with
# a token and OIDC takes over from there. Fires when a merge to main touches a
# publishable package's manifest (i.e. a `changeset version` bump lands); the
# already-published guards make reruns and no-op fires safe.
# Publish with pnpm, not npm: npm packs `workspace:*` verbatim, so a plain
# `npm publish` ships an uninstallable umbrella tarball — pnpm rewrites those
# ranges to concrete versions at pack time.
on:
  push:
    branches: [main]
    paths:
      - "packages/vestlang/package.json"
      - "packages/core/package.json"
      - "apps/mcp-server/package.json"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC for npm Trusted Publishing — no NPM_TOKEN secret needed.
      id-token: write
    env:
      # Run the JS actions on Node 24 now — GitHub is removing the Node 20 runtime
      # (forced default 2026-06-02). Keeps the proven action versions; just the runtime.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Refuse to publish artifacts that reach for anything a fresh npm install
      # can't resolve (a private-package leak or a missing runtime dep).
      - name: Guard published artifacts
        run: pnpm check:artifacts

      - name: Test
        run: pnpm test

      # pnpm 10.x delegates the upload to the ambient `npm publish`, which is the
      # actual OIDC client — and Trusted Publishing needs npm >= 11.5.1, while node
      # 22 ships npm 10.x. Upgrade so the npm pnpm spawns can do the OIDC exchange.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      # No publish token: the spawned npm exchanges the GitHub OIDC token for a
      # short-lived registry credential, per the trusted publisher configured on
      # npmjs.com.
      #
      # `pnpm publish` (not npm) so `workspace:*` ranges are rewritten to concrete
      # versions in the packed manifest. Idempotent: skip when this version is
      # already on the registry (avoids a failing re-publish). Core publishes first —
      # the umbrella depends on it, so `npm install @vestlang/vestlang` needs core
      # already on the registry.
      #
      # Git checks are disabled through pnpm's `git-checks` *setting* (the env
      # var), never the `--no-git-checks` CLI flag: pnpm forwards its publish
      # argv to the spawned `npm publish` verbatim, and current npm hard-errors
      # (EUNKNOWNCONFIG) on the unknown flag. npm only warns on the inherited
      # env setting; pnpm honors it and skips the detached-HEAD branch check.
      - name: Publish @vestlang/core (Trusted Publishing, OIDC)
        working-directory: packages/core
        env:
          npm_config_git_checks: "false"
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — skipping."
          else
            pnpm publish --access public
          fi

      - name: Publish @vestlang/vestlang (Trusted Publishing, OIDC)
        working-directory: packages/vestlang
        env:
          npm_config_git_checks: "false"
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — skipping."
          else
            pnpm publish --access public
          fi

      # The MCP server bundles the private packages into its own dist, so it has
      # no ordering constraint against the two above.
      #
      # Because it bundles them, changesets will not bump this package when one of
      # them changes — a devDependency edge never cascades a version. Engine work
      # that should reach `npx @vestlang/mcp-server` needs a changeset naming this
      # package explicitly, or the published bundle silently keeps the old engine.
      #
      # The extra first arm is the bootstrap case: npm will not accept a trusted
      # publisher for a name that isn't on the registry, so version 1 goes up by
      # hand and this step stands down until it exists. Without it the step would
      # try to publish the placeholder version on the very merge that adds this
      # package to the trigger above.
      - name: Publish @vestlang/mcp-server (Trusted Publishing, OIDC)
        working-directory: apps/mcp-server
        env:
          npm_config_git_checks: "false"
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if ! LOOKUP=$(npm view "$NAME" version 2>&1); then
            # Only a genuine 404 means "not published yet". Any other failure —
            # a registry 5xx, a rate limit, a broken proxy — must go red rather
            # than be read as consent to skip the release.
            case "$LOOKUP" in
              *E404*)
                echo "::warning::$NAME is not on the registry yet — its first publish is manual (see the release runbook); skipping."
                ;;
              *)
                echo "$LOOKUP"
                exit 1
                ;;
            esac
          elif npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — skipping."
          else
            pnpm publish --access public
          fi
