name: Release

on:
  push:
    branches: [main]
    paths:
      - 'packages/vestlang/package.json'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC for npm Trusted Publishing — no NPM_TOKEN secret needed.
      id-token: write
    env:
      # Run the JS actions on Node 24 now — GitHub is removing the Node 20 runtime
      # (forced default 2026-06-02). Keeps the proven action versions; just the runtime.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; node 22 ships an older npm.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC token for a short-lived
      # registry credential, per the trusted publisher configured on npmjs.com.
      # Idempotent: the path filter fires on any package.json edit, so skip when
      # this version is already on the registry (avoids a failing re-publish).
      - name: Publish to npm (Trusted Publishing, OIDC)
        working-directory: packages/vestlang
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — skipping."
          else
            npm publish --access public
          fi
