name: Release

# Manual-only until the first publish is bootstrapped. Trusted Publishing (OIDC)
# can't CREATE a package that doesn't exist yet, and neither @vestlang/core nor
# @vestlang/vestlang has ever been published — an automatic publish 404s for both.
# To enable auto-release: publish each once with a token
# (`cd packages/core && pnpm publish --access public`, then the same in
# packages/vestlang), configure each package's trusted publisher on npmjs.com
# (repo MattCantor/vestlang, workflow release.yml), then restore the push trigger
# below. Publish with pnpm, not npm: npm packs `workspace:*` verbatim, so a plain
# `npm publish` ships an uninstallable umbrella tarball — pnpm rewrites those
# ranges to concrete versions at pack time.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "packages/vestlang/package.json"
  #     - "packages/core/package.json"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC for npm Trusted Publishing — no NPM_TOKEN secret needed.
      id-token: write
    env:
      # Run the JS actions on Node 24 now — GitHub is removing the Node 20 runtime
      # (forced default 2026-06-02). Keeps the proven action versions; just the runtime.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Refuse to publish artifacts that reach for anything a fresh npm install
      # can't resolve (a private-package leak or a missing runtime dep).
      - name: Guard published artifacts
        run: pnpm check:artifacts

      - name: Test
        run: pnpm test

      # pnpm 10.x delegates the upload to the ambient `npm publish`, which is the
      # actual OIDC client — and Trusted Publishing needs npm >= 11.5.1, while node
      # 22 ships npm 10.x. Upgrade so the npm pnpm spawns can do the OIDC exchange.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      # No publish token: the spawned npm exchanges the GitHub OIDC token for a
      # short-lived registry credential, per the trusted publisher configured on
      # npmjs.com. NODE_AUTH_TOKEN is set empty only to resolve the ${NODE_AUTH_TOKEN}
      # placeholder in the root .npmrc's @mattcantor/GitHub-Packages auth line — a
      # different registry than the npmjs.org publish target, so it's inert here and
      # just silences pnpm's "Failed to replace env in config" warning.
      #
      # `pnpm publish` (not npm) so `workspace:*` ranges are rewritten to concrete
      # versions in the packed manifest. Idempotent: skip when this version is
      # already on the registry (avoids a failing re-publish). Core publishes first —
      # the umbrella depends on it, so `npm install @vestlang/vestlang` needs core
      # already on the registry.
      - name: Publish @vestlang/core (Trusted Publishing, OIDC)
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi

      - name: Publish @vestlang/vestlang (Trusted Publishing, OIDC)
        working-directory: packages/vestlang
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi
