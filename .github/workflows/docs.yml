name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "docs/talk/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Don't use cache: pnpm here (it invokes pnpm before it's installed)
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Use pnpm 9.x
        run: corepack prepare pnpm@9 --activate

      - name: Show pnpm version (debug)
        run: pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps
        run: pnpm -r --filter @vestlang/docs^... build

      # Export the reveal-md talk into the Docusaurus static dir so it ships at
      # /vestlang/talk/. Run from docs/talk so reveal-md resolves the css/scripts
      # front-matter paths relative to slides-10min.md. Must precede the website build
      # so Docusaurus copies static/talk into the published output.
      - name: Build talk deck (reveal-md)
        working-directory: docs/talk
        run: npx --yes reveal-md slides-10min.md --static "$GITHUB_WORKSPACE/apps/docs/static/talk"

      - name: Build website
        run: pnpm --filter @vestlang/docs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/docs/build
