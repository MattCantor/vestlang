name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build, typecheck, lint, knip, format, test
    runs-on: ubuntu-latest
    env:
      # Match the release workflow: run the JS actions on Node 24 (the Node 20
      # runtime is being removed) while keeping the proven action versions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      # Full history so the mcp-changeset guard can diff against the PR base ref.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first: typecheck and type-aware lint resolve cross-package imports
      # through the built dist outputs.
      - name: Build
        run: pnpm build

      # Scan the built artifacts of every publishable package for specifiers that
      # wouldn't resolve from npm — a private-package leak or a missing runtime dep.
      - name: Guard published artifacts
        run: pnpm check:artifacts

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Knip (unused files, exports, dependencies)
        run: pnpm knip

      - name: Format check
        run: pnpm format:check

      # A change to a package the mcp-server bundles (or to its own src) must ship
      # a changeset naming @vestlang/mcp-server, or `npx @vestlang/mcp-server` keeps
      # serving a stale engine (changesets doesn't cascade across the devDep edge).
      # Only meaningful on a PR, where there's a base to diff against; fetch that
      # base by name first so the three-dot diff resolves.
      - name: Guard mcp-server changeset
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch origin "$GITHUB_BASE_REF"
          pnpm check:mcp-changeset

      - name: Test
        run: pnpm test
