name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build, typecheck, lint, format, test
    runs-on: ubuntu-latest
    env:
      # Match the release workflow: run the JS actions on Node 24 (the Node 20
      # runtime is being removed) while keeping the proven action versions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # The repo .npmrc references ${NODE_AUTH_TOKEN}; the default GITHUB_TOKEN
          # satisfies it for installs from the GitHub registry.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build first: typecheck and type-aware lint resolve cross-package imports
      # through the built dist outputs.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test
