## A DSL for writing vesting intent

Note:
- First, the language itself.

----

## This is a vesting schedule

<blockquote class="clause">1/4th of the shares shall vest on the one-year anniversary of the Vesting Commencement Date, and an additional 1/48th of the shares shall vest on each monthly anniversary of the Vesting Commencement Date thereafter...</blockquote>

Note:
- Read the first line aloud; let it sit
- This is how every offer letter says it — verbose, familiar, a dozen ways to say the same thing
- We all know what it means — but there's no shared way to write it *down*
- I've hand-keyed more of these into spreadsheets of dates and share counts than I'd like to admit — error-prone, and it doesn't move between systems

----

<!-- .slide: data-auto-animate -->

## What if the prose were parsable?

<div class="dsl-grow">VEST OVER 4 years EVERY 1 month</div>

<p class="fragment"><code>OVER -> </code>the total span</p>
<p class="fragment"><code>EVERY -> </code>the release cadence</p> 

Note:
- What if that sentence were something a computer could read?
- [click] OVER → the total span
- [click] EVERY → the release cadence
- Lawyer still reads it; the computer gets exact, integer-share allocation — no rounding drift

----

<!-- .slide: data-auto-animate -->


## Add the cliff

<div class="dsl-grow">VEST OVER 4 years EVERY 1 month CLIFF 1 year</div>

Note:
- Add one word: CLIFF 1 year
- The cliff is a *gate* — nothing for a year, then the first 12 months land together (there's your "1/4"), monthly after
- Same offer-letter sentence — now exact
- **foreshadowing** vestlang DSL uses CLIFF differently than how you might expect
----

<!-- .slide: data-auto-animate -->

## Vesting Start

<div class="dsl-grow">VEST FROM 6 months OVER 4 years EVERY 1 month</div>

<p class="dsl-cap">an <strong>offset</strong> from the grant date</p>

Note:
- Where does the clock start? Default is the grant date
- FROM 6 months → an offset: six months after grant, whenever that turns out to be

----

<!-- .slide: data-auto-animate -->

## Vesting Start

<div class="dsl-grow">VEST FROM DATE 2026-01-01 OVER 4 years EVERY 1 month</div>

<p class="dsl-cap">an <strong>explicit</strong> calendar date</p>

Note:
- FROM DATE → a fixed calendar date

----

<!-- .slide: data-auto-animate -->

## Vesting Start

<div class="dsl-grow">VEST FROM EVENT IPO OVER 4 years EVERY 1 month</div>

<p class="dsl-cap">vesting start contingent on an event</p>

Note:
- FROM EVENT IPO → a start with **no date yet**
- flag this, it's where we go later

----

<!-- .slide: data-auto-animate -->

## Vesting Start

<div class="dsl-grow">VEST OVER 4 years EVERY 1 month</div>

<p class="dsl-cap"><strong>no <code>FROM</code></strong> — the start is the grant date</p>

Note:
- no FROM → back to the grant date, the default

----

## Vest just a portion

<div class="dsl-lines">
<div class="dsl-line">0.5 VEST OVER 2 years EVERY 1 month</div>
</div>

Note:
- A statement can take a leading fraction — a *portion* of the grant
- 0.5 on its own leaves half unallocated (vestlang warns you) — so you combine portions
- Two ways to combine, coming up

----

## One After Another

<div class="dsl-lines">
<div class="dsl-line">0.5 VEST OVER 2 years EVERY 1 month</div>
<div class="dsl-line i1 fragment">THEN 0.5 VEST OVER 2 years EVERY 3 months</div>
</div>

<p class="fragment">the second half begins when the first ends - 4 years in total</p>

Note:
- THEN runs the portions in sequence — the second waits for the first to finish
- Half over two years, then the other half over the next two — four years end to end

----


## One on top of another


<div class="dsl-lines">
<div class="dsl-line">0.5 VEST OVER 2 years EVERY 1 month</div>
<div class="dsl-line i1 fragment">PLUS 0.5 VEST OVER 2 years EVERY 3 months</div>
</div>

<p class="fragment">both halves run from the same start — 2 years in total</p>

Note:
- Same two halves, one word changed — PLUS
- PLUS runs them in parallel — both start together, done in two years
- In practice PLUS combines *different* schedules — a monthly tranche beside a quarterly one
- (portions still have to sum to the whole)
- **foreshadowing**: many vendors do not model vesting this way - more on this later
----

## Selectors

<div class="dsl-lines">
<div class="dsl-line">VEST OVER 4 years EVERY 1 month</div>
<div class="dsl-line i1 fragment">CLIFF LATER OF (12 months, EVENT IPO)</div>
</div>

<p class="fragment"><code>LATER OF -> </code>Waits for both and compares</p>

<p class="fragment"><code>EARLIER OF -> </code>Whichever comes first</p>

Note:
- This is the step that makes vestlang more than shorthand
- A start or a cliff doesn't have to be a known date — it can be "the later of a time-based cliff and a liquidity event"
- LATER OF waits for both; EARLIER OF takes whichever lands first
- This is the contingency a lawyer writes in prose and a spreadsheet of dates can't hold

----

## Two-Tier Vesting

<div class="dsl-lines">
<div class="dsl-line">VEST OVER 4 years EVERY 1 month</div>
<div class="dsl-line i1 fragment">CLIFF LATER OF (</div>
<div class="dsl-line i2 fragment">12 months,</div>
<div class="dsl-line i2 fragment">EARLIER OF (</div>
<div class="dsl-line i3 fragment">EVENT IPO BEFORE grantDate + 7 years,</div>
<div class="dsl-line i3 fragment">EVENT CIC BEFORE grantDate + 7 years))</div>
</div>

Note:
- Build it up line by line — the most common real contingency
- [click] classic four-year monthly
- [click] but the cliff is a LATER OF — nothing releases until *both* a gate and something else
- [click] the time gate is the one-year service cliff
- [click] the something is an EARLIER OF of two liquidity events — IPO or a change of control
- [click] and each carries a deadline: grantDate + 7 years — the fuse; no liquidity in seven years and the grant is forfeited
- Read as intent: vest monthly over four years, nothing until both the service cliff and a liquidity event — whichever is later — and it must land within seven years
- The payoff: stored before anything fires, it's a clean OCF template. Fires late → a lump on the event date, then monthly; fires early → the plain 12-month cliff, exactly beat two's schedule
- That is spec → compiler → projection

## A reference compiler for an OCF vesting spec

Note:
- Now zoom out from my story to the ecosystem
- OCF Core is being drafted — this summit is introducing it
- What matters to me: it carries a *new* vesting spec, meant to replace the old DAG-based model
- So there's a live standards effort, and vesting is right inside it

----

## Vesting isn't a shape

Most parts of a cap table are stored and read back.<!-- .element: class="fragment" -->

The vesting schedule is different.<!-- .element: class="fragment" -->

The cap table stores the vesting spec, and the vesting events that come out of it.<!-- .element: class="fragment" -->

A compiler is needed to turn the vesting spec into the vesting events.<!-- .element: class="fragment" -->

Note:
- [click] most of a cap table is just shapes you store and read back
- [click] the vesting schedule is different
- [click] the cap table stores the *spec*, and the *events* that come out of it
- [click] and something has to turn the spec into those events — that's a compiler
- OCF standardized only the events; its one attempt at the spec layer (the DAG) never got adopted
- Land it: vestlang is a first *reference compiler* for the spec OCF Core is drafting

## A classifier for what OCF can hold

Note:
- Next: what can OCF actually hold — and where's the edge?

----

## Two modes

<div class="two-col classify">
<div class="col">

### storable
*blind to events · immune to back-dated firings*

- **template** — expressed as OCF vesting spec
- **events-only** — only vesting events, no spec
- **unrepresentable** — no home in OCF at all
- **impossible** — self-contradictory

</div>
<div class="col">

### resolution
*honors known events · intent lost, facts kept*

- **template** — expressed as OCF vesting spec
- **events-only** — only vesting events, no spec
- **unresolved** — still waiting on an event
- **impossible** — self-contradictory

</div>
</div>

> The two can **disagree**.
> The difference is the **seam** that articulates what OCF can and cannot express

Note:
- vestlang reads every schedule two ways
- *storable* — blind to events, immune to back-dated firings: what a record-keeper can hold
- *resolution* — honors the events you know: what it actually works out to
- Each lands in one of four buckets — three are shared; only one differs (unrepresentable vs unresolved)
- The point: the two can *disagree* — and that disagreement is the seam, what OCF can and can't express

----

## The classifier in action

<div class="two-col">
<div class="col">

**OCF can hold it**

- storable → **an OCF spec**
- resolution → the later of 12 months and B

</div>
<div class="col">

```vest
VEST CLIFF
    LATER OF (12 months, EVENT B)
```

</div>
</div>

<div class="two-col">
<div class="col">

<span class="seam">OCF can't hold it</span>

- storable → **nothing to store**
- resolution → the earlier of 12 months and B

</div>
<div class="col">

```vest
VEST CLIFF
    EARLIER OF (12 months, EVENT B)
```

</div>
</div>

> In this example `LATER OF` vs `EARLIER OF` is the seam between storable OCF and the vestlang extension.

Note:
- Same cliff, one selector flips it
- LATER OF (12 months, event) → OCF can hold it, it stores as a spec
- EARLIER OF (12 months, event) → OCF can't — nothing to store, because the event could pull the cliff *below* the 12-month floor
- Both still *resolve* fine — but only one is storable
- One selector — LATER OF vs EARLIER OF — is the seam

## Example 1: Contingent Vesting Start

<!-- .slide: class="storage-ex" -->

*"Vesting starts when the IPO happens"* 

<div class="two-col">
<div class="col">

Storable

- `vesting start = 9999-12-31`

</div>
<div class="col">

Vestlang sidecar
- <span class="seam"><code>`evt:start → EVENT IPO`</code></span>

</div>
</div>

<div class="two-col">
<div class="col">

Update record-keeper
- `vesting start = 2026-03-01`

</div>
<div class="col">

The sidecar resolves
- `IPO = 2026-03-01`

</div>
</div>

> The contingency lives in the **vestlang sidecar** — the record-keeper never has to understand it. When the event fires, the user just swaps the placeholder for the real date, exactly as they would today.

Note:
- "Vesting starts when the IPO happens" — the record needs a *date*, and there isn't one yet
- Assume for now that OCF's vesting start is always a date, and when it is not known we use far-future placeholder — 9999-12-31 — valid, but it never vests
- The real start rides along in a note beside it: start = the IPO
- When IPO fires — March 2026 — swap the placeholder for the real date; the schedule follows
- The contingency lived in the note; the record-keeper never had to understand it — it just set a start date, like it does every day

## Example 2: Contingencies

<!-- .slide: class="storage-ex" -->

<div class="dsl-lines">
<div class="dsl-line">VEST OVER 4 years EVERY 1 month</div>
<div class="dsl-line i1">CLIFF EVENT A BEFORE EVENT B</div>
</div>

<div class="two-col">
<div class="col">

Storable
- `event_condition → evt:1`

</div>
<div class="col">

Vestlang sidecar
- <span class="seam"><code>`evt:1 → EVENT A BEFORE EVENT B`</code></span>

</div>
</div>

<div class="two-col">
<div class="col">

Update record-keeper
- `evt:1 = 2027-06-01`

</div>
<div class="col">

The sidecar resolves
- `EVENT A = 2027-06-01`

</div>
</div>

> Same mechanism as the contingent start. The record-keeper holds a plain event pointer and does not have to understand the contingency. The contingency lives in the **vestlang sidecar**.

Note:
- Same trick, one level down — now the contingency is in the *cliff*
- The cliff is a gated event: vest at event A, but only if it beats event B
- Storable holds a plain pointer — event_condition → evt:1, a stand-in
- What evt:1 *means* — A before B — lives in the sidecar note
- When A fires in time, the note resolves it to a real date; the record-keeper never sees the contingency

## An on-ramp for existing cap tables

Note:
- Last section — and this one runs backwards
- Everything so far went spec → numbers; now numbers → spec
- The point is migration: getting the cap tables that already exist *into* OCF

----

## From numbers back to a spec

<div class="two-col">
<div class="col">

**what you have**

```text
2026-01-01   1,200
2026-02-01     100
2026-03-01     100
    ⋮            ⋮
```

</div>
<div class="col">

**what comes back**

```vest
VEST OVER 48 months
  EVERY 1 month
  CLIFF 12 months
```

</div>
</div>

No guessing: it proposes candidate specs, runs each **forward through the same compiler**, and keeps the one that reproduces your numbers **to the share.**

> The reference compiler, used to *search*. A **verified** way into OCF for cap tables that already exist,
and a way to validate that a spec and its projection agree

Note:
- A real cap table isn't a spec — it's a column of dates and amounts
- The inferrer recovers the spec — but no guessing
- It proposes candidate specs, runs each *forward* through the very same compiler, and keeps the one that reproduces your numbers to the share
- So it's the reference compiler, used to *search* — a verified way into OCF

----

## Will it work on my cap table?

<div class="two-col">
<div class="col">

**Shapes it recognizes**
- a uniform **train**
- a **cliff**
- a **pre-grant fold** — vesting before the grant
- a **`THEN` chain** of segments

*each candidate round-trips through the compiler before it's offered*

</div>
<div class="col">

**When nothing fits**

```vest
500 VEST FROM DATE 2026-03-15
PLUS 1200 VEST FROM DATE 2026-09-02
PLUS 300 VEST FROM DATE 2027-01-20
⋮
```

*it never fails — worst case a literal, per-date list: imperative and ugly, but lossless and exact*

</div>
</div>

> Across **~2,000** generated schedules, every one reproduces **to the share** — concise where there's structure, an honest event-by-event list where there isn't.

Note:
- The natural question: will it work on *my* weird cap table?
- It recognizes the common shapes — a train, a cliff, a pre-grant fold, a THEN chain
- Every candidate has to round-trip through the compiler before it's offered — nothing is a guess
- And when nothing fits? It still can't fail — worst case it degrades to a literal, per-date list. Ugly and imperative, but lossless and exact
- Across ~2,000 generated schedules, every one reproduces to the share
